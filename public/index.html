<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - RyanERP</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .auth-brand-logo {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.14);
      flex: 0 0 auto;
    }

    .auth-brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .auth-brand-copy h1 {
      margin: 0;
    }

    .auth-brand-copy p {
      margin: 4px 0 0 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card auth-card">
      <div class="auth-brand">
        <div class="auth-brand-logo">
          <img src="/assets/ryan-erp-logo-icon.png?v=20260627c" alt="Ryan ERP" />
        </div>
        <div class="auth-brand-copy">
          <h1>Connexion</h1>
          <p class="hint">Accès sécurisé à RyanERP</p>
        </div>
      </div>
      <p class="hint">Profils : <strong>admin</strong> / admin123 &nbsp;|&nbsp; <strong>achat_user</strong> / achat@123 &nbsp;|&nbsp; <strong>chef_chantier_site15</strong> / chefsite15@123</p>
      <form id="login-form">
        <label>Nom d’utilisateur</label>
        <input type="text" id="username" required autocomplete="username" />
        <label>Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password" />
        <button type="submit">Se connecter</button>
      </form>
      <div id="login-error" class="error"></div>
    </div>
  </div>

  <script>
    // Keep login page accessible even with an active token so users can switch profile.

    const form = document.querySelector('#login-form');
    const errorBox = document.querySelector('#login-error');

    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorBox.textContent = '';

      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.querySelector('#username').value,
          password: document.querySelector('#password').value,
        }),
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        errorBox.textContent = data.error || 'Erreur de connexion';
        return;
      }

      const data = await response.json();
      localStorage.setItem('erp_token', data.token);
      window.location.href = 'erp.html';
    });
  </script>
</body>
</html>
