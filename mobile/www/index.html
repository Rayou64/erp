<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Ryan ERP Mobile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    :root {
      --primary: #0b5fff;
      --primary-2: #0041c4;
      --bg: #e7eefb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #d6deea;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1300px 700px at 20% -20%, #ffffff 0%, #eef3fb 35%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--text);
    }

    .card {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 14px;
    }

    .error {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--danger-bg);
      color: var(--danger-text);
      font-size: 13px;
    }

    .error.visible { display: block; }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 13px;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--text);
      background: #fff;
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(11, 95, 255, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .button-primary {
      flex: 1;
      color: #fff;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
    }

    .button-light {
      color: #1e293b;
      background: #eef3fb;
      border: 1px solid var(--border);
    }

    .hint {
      margin-top: 12px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Connexion ERP</h1>
    <p class="subtitle">Connexion obligatoire pour ouvrir l'application.</p>

    <div id="error" class="error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Utilisateur</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>

      <div class="actions">
        <button type="submit" class="button button-primary" id="submitBtn">Se connecter</button>
        <button type="button" class="button button-light" id="clearBtn">Effacer</button>
      </div>
    </form>

    <p class="hint">Sans authentification valide, aucun accès à l'application.</p>
  </main>

  <script>
    (function () {
      const API_BASE = 'https://ryanerp-hn5zd.ondigitalocean.app';
      const ERP_BUILD_TAG = '20260530-1';
      const ERP_URL = `https://ryanerp-hn5zd.ondigitalocean.app/erp.html?v=${ERP_BUILD_TAG}`;
      const LOGIN_KEY = 'ryanerp_mobile_auth';
      const ERP_TOKEN_KEY = 'erp_token';
      const ERP_USER_KEY = 'erp_username';
      const MAX_SESSION_MS = 6 * 60 * 60 * 1000;

      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const clearBtn = document.getElementById('clearBtn');
      const errorBox = document.getElementById('error');

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.add('visible');
      }

      function hideError() {
        errorBox.textContent = '';
        errorBox.classList.remove('visible');
      }

      function readMobileAuth() {
        try {
          const raw = localStorage.getItem(LOGIN_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function isAuthValid(auth) {
        if (!auth || !auth.token || !auth.timestamp) return false;
        return (Date.now() - Number(auth.timestamp)) < MAX_SESSION_MS;
      }

      function saveAuth(token, username) {
        const payload = {
          token,
          username,
          timestamp: Date.now(),
        };
        localStorage.setItem(LOGIN_KEY, JSON.stringify(payload));
        localStorage.setItem(ERP_TOKEN_KEY, token);
        localStorage.setItem(ERP_USER_KEY, username);
      }

      function clearAuth() {
        localStorage.removeItem(LOGIN_KEY);
        localStorage.removeItem(ERP_TOKEN_KEY);
        localStorage.removeItem(ERP_USER_KEY);
      }

      function redirectToApp(authToken) {
        const dest = authToken
          ? `${ERP_URL}&mobileAuth=${encodeURIComponent(authToken)}`
          : ERP_URL;
        window.location.replace(dest);
      }

      const existingAuth = readMobileAuth();
      if (isAuthValid(existingAuth)) {
        redirectToApp(existingAuth.token);
      } else {
        clearAuth();
      }

      clearBtn.addEventListener('click', function () {
        hideError();
        loginForm.reset();
        usernameInput.focus();
      });

      loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        hideError();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
          showError('Utilisateur et mot de passe obligatoires.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Connexion...';

        try {
          const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          let data = {};
          try {
            data = await response.json();
          } catch {
            data = {};
          }

          if (!response.ok || !data.token) {
            showError(data.error || 'Connexion refusée. Vérifie tes identifiants.');
            return;
          }

          saveAuth(data.token, data.username || username);
          redirectToApp(data.token);
        } catch (error) {
          showError('Erreur réseau. Réessaie dans quelques instants.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Se connecter';
        }
      });
    })();
  </script>
</body>
</html>
